version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vehicleiq-postgres
    environment:
      POSTGRES_USER: vehicleiq
      POSTGRES_PASSWORD: vehicleiq
      POSTGRES_DB: vehicleiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehicleiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vehicleiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicleiq-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vehicleiq:vehicleiq@postgres:5432/vehicleiq
      - REDIS_URL=redis://redis:6379/0
      - PADDLEOCR_URL=http://paddleocr:8001
      - YOLO_URL=http://yolo:8002
      - EMBEDDINGS_URL=http://embeddings:8003
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehicleiq-worker
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://vehicleiq:vehicleiq@postgres:5432/vehicleiq
      - REDIS_URL=redis://redis:6379/0
      - PADDLEOCR_URL=http://paddleocr:8001
      - YOLO_URL=http://yolo:8002
      - EMBEDDINGS_URL=http://embeddings:8003
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehicleiq-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  paddleocr:
    build:
      context: ./services/paddleocr
      dockerfile: Dockerfile
    container_name: vehicleiq-paddleocr
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  yolo:
    build:
      context: ./services/yolo
      dockerfile: Dockerfile
    container_name: vehicleiq-yolo
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    container_name: vehicleiq-embeddings
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backend_storage:
